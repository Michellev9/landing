<!-- Sección de Configuración -->
<section class="settings-section">
  <h2 class="section-title">Configuración del Dashboard</h2>

  <div class="settings-grid">

    <!-- Tarjeta: Perfil y Cuenta -->
    <div class="settings-card">
      <div class="card-header">
        <div class="icon-wrapper blue">
          <span>👤</span>
        </div>
        <h3>Perfil y Cuenta</h3>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" value="Admin StarNutri" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Email / Usuario</label>
          <input type="email" value="starnutri@gmail.com" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Rol</label>
          <select>
            <option selected>Administrador/a</option>

          </select>
        </div>
        <button class="btn btn-outline danger">Guardar cambios</button>
      </div>
    </div>

    <!-- Tarjeta: Preferencias del Dashboard -->
    <div class="settings-card">
      <div class="card-header">
        <div class="icon-wrapper purple">
          <span>⚙️</span>
        </div>
        <h3>Preferencias del Dashboard</h3>
      </div>
      <div class="card-body">
        <div class="toggle-group">
          <label>Modo oscuro</label>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
          </label>
        </div>
        <div class="toggle-group">
          <label>Mostrar alertas en tiempo real</label>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
          </label>
        </div>
        <div class="toggle-group">
          <label>Notificaciones por email</label>
          <label class="switch">
            <input type="checkbox">
            <span class="slider round"></span>
          </label>
        </div>
        <div class="form-group mt-1">
          <label>Idioma principal</label>
          <select>
            <option selected>Español (México)</option>
            <option>English (US)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Tarjeta: Seguridad -->
    <div class="settings-card">
      <div class="card-header">
        <div class="icon-wrapper red">
          <span>🔒</span>
        </div>
        <h3>Seguridad</h3>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>Contraseña actual</label>
          <input type="password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" placeholder="Nueva contraseña">
        </div>
        <div class="form-group">
          <label>Confirmar nueva contraseña</label>
          <input type="password" placeholder="Repite la contraseña">
        </div>
        <button class="btn btn-outline danger">Cambiar contraseña</button>

        <div class="mt-2">
          <p class="security-note">Sesión actual: Activa desde hace 2 horas (Ciudad de México)</p>
          <button class="btn btn-outline logout">Cerrar todas las sesiones</button>
        </div>
      </div>
    </div>
