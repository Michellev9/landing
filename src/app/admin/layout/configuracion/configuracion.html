<section class="settings-section">

  <h2 class="section-title">Configuración del Dashboard</h2>

  <div class="settings-grid">

    <!-- PERFIL -->
    <div class="settings-card">
      <div class="card-header-config">
        <div class="icon-wrapper green">👤</div>
        <h3>Perfil y Cuenta</h3>
      </div>

      <div class="card-body">
        <div class="form-group">
          <label>Nombre completo</label>
          <input [(ngModel)]="perfil.nombre" placeholder="Tu nombre">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input [(ngModel)]="perfil.email" type="email">
        </div>

        <div class="form-group">
          <label>Rol</label>
          <select [(ngModel)]="perfil.rol">
            <option value="admin">Administrador</option>
            <option value="usuario">Usuario</option>
          </select>
        </div>

        <button class="btn save" (click)="guardarPerfil()">Guardar cambios</button>
      </div>
    </div>

    <!-- PREFERENCIAS -->
    <div class="settings-card">
      <div class="card-header-config">
        <div class="icon-wrapper green">⚙️</div>
        <h3>Preferencias</h3>
      </div>

      <div class="card-body">

      <div class="toggle-group">
        <span>Modo oscuro</span>
        <label class="switch">
          <input 
            type="checkbox" 
            [(ngModel)]="prefs.darkMode"
            (change)="guardarPreferencias()"
          >
          <span class="slider"></span>
        </label>
      </div>

        <div class="toggle-group">
          <span>Alertas en tiempo real</span>
          <label class="switch">
            <input type="checkbox" [(ngModel)]="prefs.alertas">
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle-group">
          <span>Notificaciones por email</span>
          <label class="switch">
            <input type="checkbox" [(ngModel)]="prefs.emailNotif">
            <span class="slider"></span>
          </label>
        </div>

        <div class="form-group">
          <label>Idioma</label>
          <select [(ngModel)]="prefs.idioma">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
        </div>

        <button class="btn save" (click)="guardarPreferencias()">Guardar preferencias</button>

      </div>
    </div>

    <!-- SEGURIDAD -->
    <div class="settings-card">
      <div class="card-header-config">
        <div class="icon-wrapper red">🔒</div>
        <h3>Seguridad</h3>
      </div>

      <div class="card-body">

        <div class="form-group">
          <label>Contraseña actual</label>
          <input type="password" [(ngModel)]="password.actual">
        </div>

        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" [(ngModel)]="password.nueva">
        </div>

        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" [(ngModel)]="password.confirmar">
        </div>

        <button class="btn danger" (click)="cambiarPassword()">
          Cambiar contraseña
        </button>

      </div>
    </div>

  </div>

</section>
