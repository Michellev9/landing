<button class="menu-toggle" (click)="toggleSidebar()">
  ☰
</button>

<div class="overlay" 
     [class.active]="isSidebarOpen"
     (click)="toggleSidebar()">
</div>

<aside class="sidebar" [class.active]="isSidebarOpen">
  <div class="logo-wrapper">
    <img src="logo_blanco.png" class="logo"/>
  </div>

  <nav class="main-nav">
    <div class="nav-section">
      <p class="nav-title">General</p>
      <a (click)="navigateTo('/admin/dashboard')" class="nav-link">🏠 Dashboard</a>
    </div>

    <div class="nav-section">
      <p class="nav-title">Gestión</p>
      <a (click)="navigateTo('/admin/gestion-usuarios')" class="nav-link">👨‍👩‍👧 Usuarios</a>
      <a (click)="navigateTo('/admin/gestion-contacto')" class="nav-link">📬 Contactos</a>
    </div>

    <div class="nav-section">
      <p class="nav-title">Sistema</p>
      <a (click)="navigateTo('/admin/configuracion')" class="nav-link">⚙️ Configuración</a>
    </div>
  </nav>

  <div class="user-profile">
    <div class="avatar-placeholder"></div>
    <div class="user-info">
      <p class="user-name">Administrador</p>
      <p class="user-role">Admin</p>
    </div>

    <!-- ✅ Botón logout abre modal -->
    <button class="logout-btn" (click)="openLogoutModal()">
      ⏻
    </button>
  </div>
</aside>

<div class="logout-modal-backdrop" *ngIf="showLogoutModal">
  <div class="logout-modal glass">
    <h2>Cerrar Sesión</h2>
    <p>¿Estás seguro que deseas salir?</p>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeLogoutModal()">Cancelar</button>
      <button class="btn-confirm" (click)="confirmLogout()">Salir</button>
    </div>
  </div>
</div>
