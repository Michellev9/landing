<div class="login-page">
  <div class="bubbles">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-wrapper">
        <div class="logo">StarNutri</div>
      </div>

      <h1>Bienvenido de nuevo</h1>
      <p class="subtitle">Ingresa tus datos para continuar</p>

      <form class="login-form" (ngSubmit)="login()">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="email"
            name="email"
            placeholder="ejemplo@starnutri.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading">
          <span *ngIf="!isLoading">Entrar</span>
          <span *ngIf="isLoading">Ingresando...</span>
        </button>
      </form>

      <div class="extra-links">
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        <p class="signup-text">
          ¿No tienes cuenta? <a href="#" class="signup-link">Regístrate aquí</a>
        </p>
      </div>
    </div>
  </div>
</div>
