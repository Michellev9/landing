<div class="stars-background">
  <!-- Capas de estrellas con movimiento parallax sutil -->
  <div class="stars-layer base"
       [ngStyle]="{'transform': 'translate(' + mouseX * 0.01 + 'px, ' + mouseY * 0.01 + 'px)'}"></div>
  <div class="stars-layer twinkling"
       [ngStyle]="{'transform': 'translate(' + mouseX * 0.02 + 'px, ' + mouseY * 0.02 + 'px)'}"></div>
  <div class="stars-layer moving"
       [ngStyle]="{'transform': 'translate(' + mouseX * 0.035 + 'px, ' + mouseY * 0.035 + 'px)'}"></div>

  <!-- Elementos flotantes (frutas/estrellas) -->
  <div *ngFor="let item of floatingItems" class="floating-item-wrapper"
       [ngStyle]="{
         'top': item.currentTop + '%', 
         'left': item.left + '%', 
         'transform': 'translate(' + item.transformX + 'px, ' + item.transformY + 'px)'
       }">
    <div class="floating-item" 
         [style.font-size]="item.size" 
         [style.animation-delay]="item.delay">
      {{ item.icon }}
    </div>
  </div>
</div>

<div class="login-container">
  <div class="flip-card-container">
    <div class="flip-card" [class.flipped]="isRegisterMode">

      <!-- Cara frontal: LOGIN -->
      <div class="flip-card-face flip-card-front">
        <div class="login-card glass">
          <div class="logo-wrapper">
            <div class="logo">StarNutri</div>
          </div>

          <h1>¡Bienvenido de nuevo!</h1>
          <p class="subtitle">Ingresa tus datos para continuar</p>

          <form class="login-form" (ngSubmit)="login()">
            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <input 
                type="email" 
                id="email" 
                [(ngModel)]="email"
                name="email"
                placeholder="ejemplo@starnutri.com"
                required
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input 
                type="password" 
                id="password" 
                [(ngModel)]="password"
                name="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="btn-login" [disabled]="isLoading">
              <span *ngIf="!isLoading">Iniciar Sesión</span>
              <span *ngIf="isLoading">Iniciando Sesión...</span>
            </button>
          </form>

          <div class="extra-links">
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            <p class="signup-text">
              ¿No tienes cuenta? 
              <a href="#" (click)="toggleMode(); $event.preventDefault()" class="signup-link">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </div>

      <!-- Cara trasera: REGISTRO -->
      <div class="flip-card-face flip-card-back">
        <div class="login-card glass">
          <div class="logo-wrapper">
            <div class="logo">StarNutri</div>
          </div>

          <h1>¡Únete ahora!</h1>
          <p class="subtitle">Crea tu cuenta en segundos</p>

          <form class="login-form" (ngSubmit)="register()">
            <div class="form-group">
              <label for="name">Nombre completo</label>
              <input 
                type="text" 
                id="name" 
                [(ngModel)]="name"
                name="name"
                placeholder="Tu nombre"
                required
              />
            </div>

            <div class="form-group">
              <label for="reg-email">Correo electrónico</label>
              <input 
                type="email" 
                id="reg-email" 
                [(ngModel)]="regEmail"
                name="regEmail"
                placeholder="ejemplo@starnutri.com"
                required
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="reg-password">Contraseña</label>
              <input 
                type="password" 
                id="reg-password" 
                [(ngModel)]="regPassword"
                name="regPassword"
                placeholder="Mínimo 8 caracteres"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirmar contraseña</label>
              <input 
                type="password" 
                id="confirm-password" 
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                placeholder="Repite tu contraseña"
                required
              />
            </div>

            <button type="submit" class="btn-login" [disabled]="isLoading">
              <span *ngIf="!isLoading">Registrarme</span>
              <span *ngIf="isLoading">Creando cuenta...</span>
            </button>
          </form>

          <div class="extra-links">
            <p class="signup-text">
              ¿Ya tienes cuenta? 
              <a href="#" (click)="toggleMode(); $event.preventDefault()" class="signup-link">Inicia sesión</a>
            </p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
