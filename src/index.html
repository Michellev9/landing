<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>StarNutri</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body,
    html {
      overflow-x: hidden;
      font-family: system-ui, sans-serif;
    }

    @keyframes fruityBreeze {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
      }

    #loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(90deg, #e0f2e9, #ffe4c4, #fffde7, #d4f4dd, #e0f2e9);  
      background-size: 500% 500%;
      animation: fruityBreeze 24s linear infinite; 
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #loader.hide {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.80);
    }

    .loader-content {
      text-align: center;
    }

    .video-container {
      position: relative;
      width: 400px;
      height: 300px;
      margin: 0 auto 1.2rem;
      border-radius: 10%;
      overflow: hidden;

    }

    .video-loader {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }


    .percentage-text {
      display: block;
      font-size: 3.8rem;
      font-weight: 500;
      color: black;
      margin-bottom: 0.2rem;
    }



    @media (max-width: 400px),
    (max-height: 500px) {
      .video-container {
        width: 220px;
        height: 220px;
      }

      .percentage-text {
        font-size: 3rem;
      }
    }

    app-root {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s ease;
    }

    app-root.loaded {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <app-root></app-root>

  <div id="loader">
    <div class="loader-content">

      <div class="video-container">
        <video id="loadingVideo" class="video-loader" autoplay muted playsinline>
          <source src="loading.mp4" type="video/mp4">
        </video>

        <svg class="progress-ring">
          <circle class="progress-ring-circle" cx="140" cy="140" r="130" id="progressCircle" />
        </svg>
      </div>

      <span class="percentage-text" id="percentText">0%</span>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loader');
      const video = document.getElementById('loadingVideo');
      const circle = document.getElementById('progressCircle');
      const percentTxt = document.getElementById('percentText');

      const radius = 130;
      const circumference = 2 * Math.PI * radius;
      circle.style.strokeDasharray = circumference;

      function setProgress(percent) {
        const progress = Math.min(100, Math.max(0, percent));
        percentTxt.textContent = Math.round(progress) + '%';
      }

      function syncWithVideo() {
        if (!usingVideoProgress || !video.duration) return;
        const percent =
          (video.currentTime / video.duration) * 100;
        setProgress(percent);
        if (percent < 100) {
          requestAnimationFrame(syncWithVideo);
        }
      }
      
      let usingVideoProgress = false;

      video.addEventListener('loadedmetadata', () => {
        if (video.duration > 0 && video.duration < 30) {
          usingVideoProgress = true;
          video.playbackRate = 1.2;
          requestAnimationFrame(syncWithVideo);
        }
      });

      video.addEventListener('ended', () => {
        setProgress(100);
        setTimeout(() => {
          hideLoader();
        }, 100);
      });

      video.addEventListener('loadeddata', () => {
        setProgress(0);
      });


      let simulatedProgress = 0;
      const simInterval = setInterval(() => {
        if (usingVideoProgress && video.readyState >= 3) return;

        const remaining = 100 - simulatedProgress;
        if (remaining <= 0) {
          clearInterval(simInterval);
          setProgress(100);
          hideLoader();
          return;
        }

        // Incrementos más grandes para una carga más rápida
        const step = Math.max(3, remaining * 0.15) * (0.8 + Math.random() * 0.4);
        simulatedProgress = Math.min(100, simulatedProgress + step);
        setProgress(simulatedProgress);
      }, 100); // Reducido de 180ms a 50ms para que sea más rápido

      function hideLoader() {
        setProgress(100);
        if (typeof msgInterval !== 'undefined') clearInterval(msgInterval);
        loader.classList.add('hide');

        // Agregar clase para mostrar el contenido de la app suavemente
        const appRoot = document.querySelector('app-root');
        if (appRoot) {
          appRoot.classList.add('loaded');
        }

        setTimeout(() => loader.remove(), 800); // Dar tiempo para la transición
      }

    });
  </script>

</body>

</html>
